name: "✨ Feature Request"
description: "Propose a new feature or enhancement"
title: "[Feature][Area] Clear feature summary"
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        # ✨ Feature Request
        Describe the feature and the user value it provides.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the functionality and the value it provides. (Required)
      placeholder: "What should we build and why?"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List testable acceptance checkboxes (required).
      placeholder: |
        - [ ] End-to-end behavior implemented
        - [ ] Reviewed by product/owner
    validations:
      required: true

  - type: textarea
    id: meta
    attributes:
      label: Meta (optional)
      description: |
        Optional: effort (S/M/L/hours), deadline, priority, related links.
      placeholder: |
        Effort: M
        Deadline: no-deadline 
        Priority: P3

