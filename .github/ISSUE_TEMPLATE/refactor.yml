name: "🔧 Refactor"
description: "Improve internal code structure without changing behavior"
title: "[Refactor][Area] What will be improved"
labels: ["refactor"]

body:
  - type: markdown
    attributes:
      value: |
        # 🔧 Refactor
        Describe the refactor goal and the intended outcome.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs restructuring and why? (Required)
      placeholder: "Refactor module X to improve maintainability..."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Testable checkboxes (required).
      placeholder: |
        - [ ] No behavior changed (manual verification or tests)
        - [ ] Unit & integration tests pass
    validations:
      required: true

  - type: textarea
    id: meta
    attributes:
      label: Meta (optional)
      description: |
        Optional: effort, expected downtime, deadline, priority.
      placeholder: |
        Effort: M
        Deadline: 2026-02-28
        Priority: P3

