name: "📚 Documentation Update"
description: "Add or improve documentation"
title: "[Docs][Area] Documentation change summary"
labels: ["documentation"]

body:
  - type: markdown
    attributes:
      value: |
        # 📚 Documentation Update
        Explain what documentation should change and where.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What documentation is missing or incorrect? (Required)
      placeholder: "Doc page, section, or example to add/update..."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What success looks like (required).
      placeholder: |
        - [ ] Documentation updated in the repo
        - [ ] Examples and links added
    validations:
      required: true

  - type: textarea
    id: meta
    attributes:
      label: Meta (optional)
      description: |
        Optional: effort estimate, deadline, priority, related PRs.
      placeholder: |
        Effort: XS
        Deadline: no-deadline

