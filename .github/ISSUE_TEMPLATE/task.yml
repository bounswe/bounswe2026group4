name: "📋 Task"
description: "General work item that is not a bug or feature"
title: "[Task][Area] Clear task description"
labels: ["task"]

body:
  - type: markdown
    attributes:
      value: |
        # 📋 Task
        Briefly describe the work to be done.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be completed? Provide context and desired outcome. (Required)
      placeholder: "Implement X, update Y, run Z..."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Testable checkboxes to declare task completion. (Required)
      placeholder: |
        - [ ] Work completed
        - [ ] Code reviewed / merged
    validations:
      required: true

  - type: textarea
    id: meta
    attributes:
      label: Meta (optional)
      description: |
        Optional: effort, deadline, priority, notes.
      placeholder: |
        Effort: S
        Deadline: 2026-02-20
        Priority: P2

