name: "🐞 Bug Report"
description: "Report something that is broken or incorrect"
title: "[Bug][Area] Short clear description"
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Example title:
        [Bug][Map] Timeline crashes when filtering by year

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain what is wrong and what should happen instead.
      placeholder: Clear explanation of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe error...

  - type: input
    id: deadline
    attributes:
      label: Deadline
      placeholder: YYYY-MM-DD or "no deadline"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Effort
      options: ["XS","S","M","L","XL"]
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Bug no longer occurs
        - [ ] Regression test added
    validations:
      required: true

  - type: input
    id: requirement_link
    attributes:
      label: Addresses Requirement / User Story (Optional)
      placeholder: REQ-12 / issue link / design doc

