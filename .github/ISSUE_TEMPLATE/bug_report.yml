name: "🐞 Bug Report"
description: "Report something that is broken or behaving incorrectly"
title: "[Bug][Area] Short clear description"
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        # 🐞 Bug Report
        Please describe the issue clearly. Provide context and expected behaviour.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain what is wrong and what should happen instead. (Required)
      placeholder: "Clear explanation of the bug and why it matters."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List testable acceptance items (use checkboxes). At least one required.
      placeholder: |
        - [ ] Bug no longer reproduces
        - [ ] Added regression test (if applicable)
    validations:
      required: true

  - type: textarea
    id: meta
    attributes:
      label: Meta (optional)
      description: |
        Optional: effort estimate (S/M/L, hours), deadline (YYYY-MM-DD), priority.
      placeholder: |
        Effort: S 
        Deadline: 2026-03-01 
        Priority: P2

