name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Django backend tests
  # ──────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: historystorymap
          MYSQL_USER: dbuser
          MYSQL_PASSWORD: ci_db_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pci_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install system dependencies
        # mysqlclient requires libmysqlclient-dev + gcc + pkg-config
        # python-magic requires libmagic1
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y default-libmysqlclient-dev gcc pkg-config libmagic1

      - name: Install Python dependencies
        run: pip install -r requirements/development.txt

      - name: Grant test database privileges
        # Django's test runner creates test_historystorymap — the app user needs CREATE DATABASE
        run: |
          mysql -h 127.0.0.1 -u root -pci_root_password \
            -e "GRANT ALL PRIVILEGES ON \`test_%\`.* TO 'dbuser'@'%'; FLUSH PRIVILEGES;"

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ci-only-secret-key-not-used-in-production
          DB_NAME: historystorymap
          DB_USER: dbuser
          DB_PASSWORD: ci_db_password
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: python -m pytest -v

  # ──────────────────────────────────────────────────────────────
  # Job 2: React frontend lint and build
  # ──────────────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
